services:
  # Web preview only (build Flutter web and serve via nginx)
  # Run the backend separately (e.g. from ../trucoshi-rs).
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Point this at wherever you're running the backend.
        # When serving the web preview on LAN, browsers need the host's LAN IP.
        TRUCOSHI_BACKEND_URL: http://10.10.3.100:2992
    ports:
      - "18080:80"
