services:
  # Backend (expects trucoshi-rs repo checked out next to trucoshi-app)
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: trucoshi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # NOTE: no host port published; avoids clashing with any local Postgres.
    # Connect from other compose services via db:5432.
    volumes:
      - trucoshi_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trucoshi"]
      interval: 2s
      timeout: 3s
      retries: 30

  api:
    build:
      context: ../trucoshi-rs
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_ADDR: 0.0.0.0:2992
      PUBLIC_BASE_URL: http://localhost:2992
      DATABASE_URL: postgres://postgres:postgres@db:5432/trucoshi
      JWT_SECRET: dev-secret-change-me
      JWT_ISSUER: trucoshi
      JWT_AUDIENCE: trucoshi
      TWITTER_CLIENT_ID: TODO
      TWITTER_CLIENT_SECRET: TODO
    ports:
      - "2992:2992"

  # Web preview (Flutter web build served by nginx)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        TRUCOSHI_BACKEND_URL: http://localhost:2992
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  trucoshi_pg:
